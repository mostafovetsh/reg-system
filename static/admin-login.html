<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الأدمن</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin-login.css">
</head>

<body>
    <div class="grid-bg"></div>

    <div class="login-container">
        <div class="admin-icon">🔐</div>

        <div class="login-header">
            <h2>تسجيل دخول الأدمن</h2>
            <p>لوحة التحكم في نظام التسجيل</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
            </div>

            <button type="submit" class="login-btn">
                تسجيل الدخول
            </button>
        </form>

        <div id="errorMessage" class="error-message hidden"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('/admin-auth', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = result.error;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'حدث خطأ في الاتصال: ' + error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
